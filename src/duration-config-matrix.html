<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duration Configuration Matrix — TEA Space</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --surface:rgba(255,255,255,0.06);--surface-h:rgba(255,255,255,0.11);
  --border:rgba(255,255,255,0.10);--border-h:rgba(255,255,255,0.20);
  --text:#f1f5f9;--text-sec:#94a3b8;--text-dim:#475569;
  --accent:#3b82f6;--success:#22c55e;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --r:8px;--r-sm:4px;
  --shelf:300px;--insp:72px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column}

/* ── Toolbar ── */
.tb{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:100}
.tb-title{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-sec)}
.tb-sep{width:1px;height:20px;background:var(--border)}
.spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:hover{background:var(--surface-h);border-color:var(--accent)}
.btn.on{background:rgba(59,130,246,.18);border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.4;cursor:default}
label.tb-label{font-size:11px;color:var(--text-sec)}
select.sel{padding:3px 7px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px;font-family:var(--font);cursor:pointer}

/* ── Layout ── */
.main{flex:1;display:flex;overflow:hidden;position:relative}

/* ── Table ── */
.tbl-wrap{flex:1;overflow:auto;padding-bottom:var(--insp)}
table.mx{border-collapse:separate;border-spacing:0;min-width:100%;table-layout:fixed}
table.mx thead th{position:sticky;top:0;z-index:20;background:var(--bg2);border-bottom:2px solid var(--border);padding:5px 6px;text-align:center;font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-sec);white-space:nowrap;user-select:none;cursor:pointer}
table.mx thead th:hover{background:var(--bg3);color:var(--text)}
table.mx th.p-col,table.mx td.p-col{position:sticky;left:0;z-index:15;background:var(--bg2);border-right:2px solid var(--border);width:200px;min-width:200px}
table.mx thead th.p-col{z-index:25;cursor:default}
table.mx tr.g-hdr td{background:var(--bg3);padding:3px 10px;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--text-sec)}
table.mx tbody tr.d-row td{border-bottom:1px solid rgba(255,255,255,.04);padding:0;height:26px}
table.mx tbody tr.d-row:hover td{background:rgba(255,255,255,.025)}
.p-inner{display:flex;align-items:center;gap:6px;padding:3px 10px;height:26px}
.p-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.p-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.th-time{min-width:38px;width:38px}
.th-time.expanded{color:var(--accent) !important;width:36px;min-width:36px}
.th-time.sub{font-size:8.5px;color:#64748b !important;min-width:30px;width:30px}
.th-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin-left:3px;vertical-align:middle;opacity:.55}
.a-cell{width:100%;height:100%;cursor:pointer;position:relative;transition:filter .12s}
.a-cell:hover{filter:brightness(1.25)}
.a-cell.sel{outline:2px solid rgba(255,255,255,.75);outline-offset:-2px;z-index:5}

/* ── Shelf ── */
.shelf{width:var(--shelf);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .32s cubic-bezier(.42,0,.28,.99)}
.shelf.hide{width:0;border-left:none}
.shelf-hdr{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.shelf-title{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text-sec)}
.shelf-scroll{flex:1;overflow-y:auto;overflow-x:visible;padding:8px 10px;perspective:1000px;perspective-origin:30% 50%}
.grp-div{display:flex;align-items:center;gap:8px;margin:8px 0 4px}
.grp-div::before,.grp-div::after{content:'';flex:1;height:1px;background:var(--border)}
.grp-lbl{font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap}
.hs-tile{position:relative;border-radius:var(--r);padding:7px 9px;margin-bottom:4px;cursor:pointer;transform-origin:left center;transition:transform .5s cubic-bezier(.42,0,.28,.99),box-shadow .5s cubic-bezier(.42,0,.28,.99),background .25s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.hs-tile:hover{transform:rotateY(-14deg) translateZ(12px);box-shadow:-5px 5px 18px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.14);z-index:10}
.hs-tile.act{transform:rotateY(-6deg) translateZ(8px);box-shadow:-3px 3px 12px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.18);z-index:9}
.t-head{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.t-depth{font-size:7.5px;font-weight:800;font-family:var(--mono);opacity:.55;flex-shrink:0}
.t-sym{font-size:14px;font-weight:800;font-family:var(--mono);flex-shrink:0;min-width:26px}
.t-name{font-size:10.5px;font-weight:600;flex:1}
.t-badge{font-size:7.5px;padding:1px 5px;border-radius:8px;font-weight:700;letter-spacing:.04em}
.t-meta{display:flex;gap:8px;font-size:8.5px;color:rgba(255,255,255,.5)}
.t-meta .mk{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.t-meta .mv{font-family:var(--mono)}
.t-nav{display:flex;align-items:center;gap:4px;margin-top:5px}
.t-nb{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);cursor:pointer;font-size:9px;color:white;transition:all .14s;flex-shrink:0}
.t-nb:hover{background:rgba(255,255,255,.16)}
.t-nb:disabled{opacity:.3;cursor:default}
.t-pos{flex:1;text-align:center;font-family:var(--mono);font-size:10.5px;font-weight:700;padding:2px 4px;border-radius:3px;background:rgba(0,0,0,.22);cursor:pointer;transition:background .14s}
.t-pos:hover{background:rgba(255,255,255,.1)}

/* ── Inspector ── */
.insp{position:fixed;bottom:0;left:0;right:0;height:var(--insp);background:var(--bg2);border-top:2px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 18px;z-index:200;overflow:hidden}
.insp-empty{color:var(--text-dim);font-size:11px;font-style:italic}
.insp-content{display:none;align-items:center;gap:14px;flex:1;min-width:0}
.insp-content.vis{display:flex}
.i-f{display:flex;flex-direction:column;gap:1px;min-width:0}
.i-lbl{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim)}
.i-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.i-val.lg{font-size:15px}
.i-sep{width:1px;height:36px;background:var(--border);flex-shrink:0}
.i-bar-wrap{display:flex;align-items:center;gap:6px;margin-top:2px}
.i-bar{height:4px;border-radius:2px;transition:width .3s}
.i-pct{font-size:9px;color:var(--text-sec)}

/* ── Dir Popup ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.off{display:none}
.popup{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:600px;max-height:68vh;display:flex;flex-direction:column;box-shadow:0 24px 56px rgba(0,0,0,.7);overflow:hidden}
.pop-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.bc{flex:1;display:flex;align-items:center;gap:3px;flex-wrap:wrap;font-size:11px;font-family:var(--mono)}
.bc-crumb{color:var(--text-sec);cursor:pointer;padding:2px 5px;border-radius:3px;transition:all .14s}
.bc-crumb:hover{background:var(--surface-h);color:var(--text)}
.bc-crumb.cur{color:var(--text);font-weight:700}
.bc-sep{color:var(--text-dim);font-size:9px;flex-shrink:0}
.pop-body{flex:1;overflow-y:auto;padding:14px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(68px,1fr));gap:5px}
.d-child{padding:7px 5px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;font-family:var(--mono);font-size:11px;font-weight:600;transition:all .15s;color:var(--text)}
.d-child:hover{background:var(--surface-h);border-color:var(--accent);transform:translateY(-1px)}
.d-child.sel{background:rgba(59,130,246,.18);border-color:var(--accent);color:var(--accent)}
.pop-ftr{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-sec)}

/* ── Hover tooltip ── */
.htip{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;font-size:11px;pointer-events:none;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.55);max-width:220px;display:none}
.htip.vis{display:block}
.ht-id{font-family:var(--mono);font-size:8.5px;color:var(--text-dim);margin-bottom:2px}
.ht-lbl{font-weight:600;margin-bottom:4px}
.ht-row{display:flex;justify-content:space-between;gap:10px;color:var(--text-sec);margin-top:2px}
.ht-v{font-family:var(--mono);color:var(--text);font-weight:600}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#475569}
</style>
</head>
<body>

<div class="tb">
  <span class="tb-title">Duration Config Matrix</span>
  <div class="tb-sep"></div>
  <label class="tb-label">Resolution:</label>
  <select class="sel" id="resSelect" onchange="onResChange(this.value)">
    <option value="0">Year</option>
    <option value="1">Month</option>
    <option value="2">Day</option>
    <option value="3">Hour</option>
    <option value="4">Minute</option>
    <option value="5">Second</option>
    <option value="8">Millisecond</option>
    <option value="11">Microsecond</option>
    <option value="14">Nanosecond</option>
  </select>
  <button class="btn" id="dirBtn">⊞ Navigate</button>
  <button class="btn" onclick="collapseAll()">↙ Collapse</button>
  <div class="spacer"></div>
  <button class="btn on" id="shelfBtn" onclick="toggleShelf()">◧ Hierarchy</button>
</div>

<div class="main">
  <div class="tbl-wrap" id="tblWrap">
    <table class="mx" id="mx">
      <thead id="mxHead"></thead>
      <tbody id="mxBody"></tbody>
    </table>
  </div>
  <div class="shelf" id="shelf">
    <div class="shelf-hdr"><div class="shelf-title">15-Level Time Hierarchy</div></div>
    <div class="shelf-scroll" id="shelfScroll"></div>
  </div>
</div>

<div class="insp" id="insp">
  <span class="insp-empty" id="inspEmpty">Click any cell to inspect</span>
  <div class="insp-content" id="inspC">
    <div class="i-f" style="max-width:180px">
      <span class="i-lbl">Parameter</span>
      <span class="i-val" id="iParam" title=""></span>
    </div>
    <div class="i-sep"></div>
    <div class="i-f">
      <span class="i-lbl">Time Unit</span>
      <span class="i-val" id="iTime"></span>
    </div>
    <div class="i-sep"></div>
    <div class="i-f">
      <span class="i-lbl">Value</span>
      <span class="i-val lg" id="iVal"></span>
    </div>
    <div class="i-sep"></div>
    <div class="i-f">
      <span class="i-lbl">Coverage</span>
      <div class="i-bar-wrap">
        <div class="i-bar" id="iBar" style="width:80px"></div>
        <span class="i-pct" id="iPct"></span>
      </div>
    </div>
    <div class="i-sep"></div>
    <div class="i-f">
      <span class="i-lbl">Group</span>
      <span class="i-val" id="iGrp"></span>
    </div>
    <div class="i-sep"></div>
    <div class="i-f">
      <span class="i-lbl">Efficacy Start → End</span>
      <span class="i-val" id="iEff"></span>
    </div>
    <div class="i-sep"></div>
    <div class="i-f">
      <span class="i-lbl">Active Level</span>
      <span class="i-val" id="iLvl"></span>
    </div>
  </div>
</div>

<div class="overlay off" id="dirOverlay" onclick="overlayClick(event)">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="pop-hdr">
      <div class="bc" id="dirBC"></div>
      <span id="dirBadge"></span>
      <button class="btn" onclick="closeDir()">✕</button>
    </div>
    <div class="pop-body"><div class="dir-grid" id="dirGrid"></div></div>
    <div class="pop-ftr">
      <span id="dirInfo"></span>
      <button class="btn" onclick="applyDir()">Apply</button>
    </div>
  </div>
</div>

<div class="htip" id="htip"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const LEVELS = [
  {depth:0,  name:'Year',        symbol:'Y',   fanout:20, dur:'3.156×10⁷ s', group:'calendar'},
  {depth:1,  name:'Month',       symbol:'M',   fanout:12, dur:'2.628×10⁶ s', group:'calendar'},
  {depth:2,  name:'Day',         symbol:'D',   fanout:31, dur:'8.640×10⁴ s', group:'calendar'},
  {depth:3,  name:'Hour',        symbol:'H',   fanout:24, dur:'3.600×10³ s', group:'calendar'},
  {depth:4,  name:'Minute',      symbol:'Min', fanout:60, dur:'60 s',         group:'calendar'},
  {depth:5,  name:'Second',      symbol:'S',   fanout:60, dur:'1 s',          group:'second'},
  {depth:6,  name:'Decisecond',  symbol:'ds',  fanout:10, dur:'10⁻¹ s',      group:'subsecond'},
  {depth:7,  name:'Centisecond', symbol:'cs',  fanout:10, dur:'10⁻² s',      group:'subsecond'},
  {depth:8,  name:'Millisecond', symbol:'ms',  fanout:10, dur:'10⁻³ s',      group:'subsecond'},
  {depth:9,  name:'10⁻⁴ s',      symbol:'t4',  fanout:10, dur:'10⁻⁴ s',      group:'ultrafine'},
  {depth:10, name:'10⁻⁵ s',      symbol:'t5',  fanout:10, dur:'10⁻⁵ s',      group:'ultrafine'},
  {depth:11, name:'Microsecond', symbol:'μs',  fanout:10, dur:'10⁻⁶ s',      group:'ultrafine'},
  {depth:12, name:'10⁻⁷ s',      symbol:'t7',  fanout:10, dur:'10⁻⁷ s',      group:'ultrafine'},
  {depth:13, name:'10⁻⁸ s',      symbol:'t8',  fanout:10, dur:'10⁻⁸ s',      group:'ultrafine'},
  {depth:14, name:'Nanosecond',  symbol:'ns',  fanout:10, dur:'10⁻⁹ s',      group:'ultrafine'},
];

const PALETTE = {
  calendar: ['#ef4444','#f97316','#eab308','#84cc16','#22c55e','#06b6d4'],
  second:   ['#0ea5e9'],
  subsecond:['#3b82f6','#6366f1','#8b5cf6'],
  ultrafine:['#a855f7','#d946ef','#ec4899','#f43f5e','#fb923c','#fbbf24'],
};
const GRP_LABELS = {calendar:'Calendar',second:'Second',subsecond:'Sub-Second',ultrafine:'Ultra-Fine'};
const GROUP_STARTS = new Set([0,5,6,9]);

function lvlColor(lvl) {
  const pal = PALETTE[lvl.group] || ['#94a3b8'];
  const idx = LEVELS.filter(l=>l.group===lvl.group).findIndex(l=>l.depth===lvl.depth);
  return pal[idx % pal.length];
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function posLabel(depth, pos) {
  if (depth===0) return `Y${pos+1}`;
  if (depth===1) return MONTHS[pos]||`M${pos+1}`;
  if (depth===2) return `D${pos+1}`;
  if (depth===3) return `${String(pos).padStart(2,'0')}h`;
  if (depth===4) return `${String(pos).padStart(2,'0')}m`;
  if (depth===5) return `${String(pos).padStart(2,'0')}s`;
  return `${LEVELS[depth].symbol}${pos}`;
}

// Parameters
const PG = [
  {id:'config', label:'Configuration', color:'#ef4444', params:[
    {id:'plantLifetimeAmount10',     label:'Plant Lifetime',            def:20},
    {id:'bECAmount11',               label:'Bare Erected Cost',         def:200000},
    {id:'numberOfUnitsAmount12',     label:'Number of Units',           def:30000},
    {id:'initialSellingPriceAmount13',label:'Price',                   def:2},
    {id:'totalOperatingCostPercentageAmount14',label:'Direct Operating Cost %',def:0.1},
    {id:'engineering_Procurement_and_Construction_EPC_Amount15',label:'EPC % of BEC',def:0},
    {id:'process_contingency_PC_Amount16',label:'Process Contingency % BEC',def:0},
    {id:'project_Contingency_PT_BEC_EPC_PCAmount17',label:'Project Contingency %',def:0},
    {id:'use_direct_operating_expensesAmount18',label:'Use Direct Op. Expenses',def:'False'},
    {id:'use_direct_revenueAmount19',label:'Use Direct Revenue',        def:'False'},
  ]},
  {id:'financing', label:'Financing', color:'#f97316', params:[
    {id:'depreciationMethodAmount20',label:'Depreciation Method',       def:0},
    {id:'loanTypeAmount21',          label:'Loan Type',                 def:'simple'},
    {id:'interestTypeAmount22',      label:'Interest Type',             def:'fixed'},
    {id:'generalInflationRateAmount23',label:'General Inflation Rate',  def:0},
    {id:'interestProportionAmount24',label:'Interest Proportion',       def:0.5},
    {id:'principalProportionAmount25',label:'Principal Proportion',     def:0.5},
    {id:'loanPercentageAmount26',    label:'Loan % of TOC',             def:0.2},
    {id:'repaymentPercentageOfRevenueAmount27',label:'Repayment % Revenue',def:0.1},
    {id:'numberofconstructionYearsAmount28',label:'Construction Years', def:1},
  ]},
  {id:'rates', label:'Rates & Fixed Costs', color:'#eab308', params:[
    {id:'iRRAmount30',               label:'Internal Rate of Return',   def:0.05},
    {id:'annualInterestRateAmount31',label:'Annual Interest Rate',       def:0.04},
    {id:'stateTaxRateAmount32',      label:'State Tax Rate',             def:0.05},
    {id:'federalTaxRateAmount33',    label:'Federal Tax Rate',           def:0.21},
    {id:'rawmaterialAmount34',       label:'Feedstock Cost',             def:10000},
    {id:'laborAmount35',             label:'Labor Cost',                 def:24000},
    {id:'utilityAmount36',           label:'Utility Cost',               def:5000},
    {id:'maintenanceAmount37',       label:'Maintenance Cost',           def:2500},
    {id:'insuranceAmount38',         label:'Insurance Cost',             def:500},
  ]},
  {id:'procV', label:'Process Quantities (V)', color:'#22c55e',
    params:Array.from({length:20},(_,i)=>({id:`vAmount${40+i}`,label:`v${40+i}`,def:1}))},
  {id:'procR', label:'Process Costs (R)', color:'#06b6d4',
    params:Array.from({length:20},(_,i)=>({id:`rAmount${60+i}`,label:`r${60+i}`,def:1}))},
];

const ALL_P = PG.flatMap(g=>g.params.map(p=>({...p,gid:g.id,glabel:g.label,gcolor:g.color})));
const PM = Object.fromEntries(ALL_P.map(p=>[p.id,p]));

// Seeded pseudo-random for demo efficacy
function seed(str) {
  let h=0; for(let i=0;i<str.length;i++) h=(Math.imul(31,h)+str.charCodeAt(i))|0;
  return Math.abs(h);
}

// Each param gets a demo efficacy window (year-indexed, 0-based)
function getEff(param) {
  const s=seed(param.id);
  if(['config','financing','rates'].includes(param.gid)) return {start:0,end:19};
  const start=(s%4); const end=14+(s%6);
  return {start,end};
}

// ── State ─────────────────────────────────────────────────────────────────────
let shelfOpen   = true;
let activeLvl   = 0;
let tPos        = Array(15).fill(0);
let expandedCol = null; // {depth,index}

// ── Columns ───────────────────────────────────────────────────────────────────
function getCols() {
  const cols=[];
  for(let i=0;i<20;i++){
    if(expandedCol && expandedCol.depth===0 && expandedCol.index===i){
      cols.push({type:'parent',depth:0,idx:i,label:posLabel(0,i),expanded:true});
      for(let m=0;m<12;m++) cols.push({type:'child',depth:1,pidx:i,idx:m,label:posLabel(1,m)});
    } else {
      cols.push({type:'year',depth:0,idx:i,label:posLabel(0,i),expanded:false});
    }
  }
  return cols;
}

function getCov(param,col) {
  const eff=getEff(param);
  if(col.type==='child'){
    if(col.pidx<eff.start||col.pidx>eff.end) return 0;
    const s=seed(param.id+'_'+col.pidx+'_'+col.idx);
    return (s%100)<55?1.0:(s%100)<75?(30+(s%40))/100:0;
  }
  if(col.idx<eff.start||col.idx>eff.end) return 0;
  if(col.idx===eff.start||col.idx===eff.end) return 0.65;
  return 1.0;
}

function cellBg(cov,color) {
  if(cov<=0) return 'background:transparent';
  if(cov>=1) return `background:${color}28;border-left:2px solid ${color}70`;
  const p=Math.round(cov*100);
  return `background:linear-gradient(90deg,${color}30 ${p}%,transparent ${p}%);border-left:2px solid ${color}45`;
}

// ── Render table ──────────────────────────────────────────────────────────────
function renderTable() {
  const cols=getCols();
  const head=document.getElementById('mxHead');
  const body=document.getElementById('mxBody');

  // Header
  let hh='<tr>';
  hh+=`<th class="p-col" style="text-align:left;padding-left:10px">Parameter</th>`;
  for(const c of cols){
    if(c.type==='parent'||c.type==='year'){
      const ec=c.expanded;
      hh+=`<th class="th-time${ec?' expanded':''}" onclick="toggleExp(${c.idx})"
        title="${c.label} — click to expand months">${c.label}<span class="th-dot"></span></th>`;
    } else {
      const cl=lvlColor(LEVELS[1]);
      hh+=`<th class="th-time sub" style="color:${cl}88" title="${c.label} in Y${c.pidx+1}">${c.label}</th>`;
    }
  }
  hh+='</tr>';
  head.innerHTML=hh;

  // Body
  let bh='';
  let prevGid=null;
  for(const p of ALL_P){
    if(p.gid!==prevGid){
      const g=PG.find(g=>g.id===p.gid);
      bh+=`<tr class="g-hdr"><td class="p-col" colspan="${cols.length+1}" style="border-left:3px solid ${g.color}">${g.label}</td></tr>`;
      prevGid=p.gid;
    }
    bh+=`<tr class="d-row"><td class="p-col"><div class="p-inner">
      <div class="p-bar" style="background:${p.gcolor}"></div>
      <span class="p-name" title="${p.id}">${p.label}</span>
    </div></td>`;
    for(const c of cols){
      const cov=getCov(p,c);
      const style=cellBg(cov,p.gcolor);
      const val=cov>0?p.def:'—';
      const eff=getEff(p);
      bh+=`<td><div class="a-cell" style="${style}"
        data-pid="${p.id}" data-cl="${c.label}" data-cd="${c.depth}"
        data-cov="${cov.toFixed(2)}" data-val="${val}"
        data-es="${posLabel(0,eff.start)}" data-ee="${posLabel(0,eff.end)}"
        onclick="selCell(this)" onmouseenter="showTip(event,this)" onmouseleave="hideTip()">
      </div></td>`;
    }
    bh+='</tr>';
  }
  body.innerHTML=bh;
}

function toggleExp(idx) {
  expandedCol=(expandedCol&&expandedCol.depth===0&&expandedCol.index===idx)?null:{depth:0,index:idx};
  renderTable();
}
function collapseAll(){expandedCol=null;renderTable();}

// ── Render shelf ──────────────────────────────────────────────────────────────
function renderShelf() {
  const sc=document.getElementById('shelfScroll');
  let h='';
  for(const lvl of LEVELS){
    if(GROUP_STARTS.has(lvl.depth)){
      h+=`<div class="grp-div"><span class="grp-lbl">${GRP_LABELS[lvl.group]}</span></div>`;
    }
    const c=lvlColor(lvl);
    const isAct=activeLvl===lvl.depth;
    const pos=tPos[lvl.depth];
    const max=lvl.fanout-1;
    h+=`<div class="hs-tile${isAct?' act':''}" id="t${lvl.depth}"
      style="background:linear-gradient(135deg,${c}20,${c}08);border:1px solid ${c}40"
      onclick="selectLvl(${lvl.depth})">
      <div class="t-head">
        <span class="t-depth" style="color:${c}">d${lvl.depth}</span>
        <span class="t-sym" style="color:${c}">${lvl.symbol}</span>
        <span class="t-name">${lvl.name}</span>
        ${isAct?`<span class="t-badge" style="background:${c}28;color:${c}">ACTIVE</span>`:''}
      </div>
      <div class="t-meta">
        <span><span class="mk">dur</span><span class="mv">${lvl.dur}</span></span>
        <span><span class="mk">fan</span><span class="mv">${lvl.fanout}</span></span>
      </div>
      <div class="t-nav" onclick="event.stopPropagation()">
        <button class="t-nb" onclick="navT(${lvl.depth},-1)" ${pos<=0?'disabled':''}>◀</button>
        <span class="t-pos" style="color:${c}" onclick="openDirAt(${lvl.depth})">${posLabel(lvl.depth,pos)}</span>
        <button class="t-nb" onclick="navT(${lvl.depth},1)" ${pos>=max?'disabled':''}>▶</button>
      </div>
    </div>`;
  }
  sc.innerHTML=h;
}

function selectLvl(depth){activeLvl=depth;renderShelf();updateInspLvl();}
function navT(depth,dir){
  const max=LEVELS[depth].fanout-1;
  tPos[depth]=Math.max(0,Math.min(max,tPos[depth]+dir));
  renderShelf();
}

// ── Inspector ─────────────────────────────────────────────────────────────────
function selCell(el){
  document.querySelectorAll('.a-cell.sel').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  const p=PM[el.dataset.pid];
  document.getElementById('inspEmpty').style.display='none';
  const ic=document.getElementById('inspC');
  ic.classList.add('vis');
  const ip=document.getElementById('iParam');
  ip.textContent=p.label;
  ip.title=p.id;
  document.getElementById('iTime').textContent=el.dataset.cl;
  document.getElementById('iVal').textContent=el.dataset.val;
  const cov=parseFloat(el.dataset.cov);
  const bar=document.getElementById('iBar');
  bar.style.width='80px';
  bar.style.background=`linear-gradient(90deg,${p.gcolor} ${cov*100}%,#334155 ${cov*100}%)`;
  document.getElementById('iPct').textContent=(cov*100).toFixed(0)+'%';
  document.getElementById('iGrp').textContent=p.glabel;
  document.getElementById('iEff').textContent=`${el.dataset.es} → ${el.dataset.ee}`;
  updateInspLvl();
}
function updateInspLvl(){
  const el=document.getElementById('iLvl');
  if(el) el.textContent=LEVELS[activeLvl].name;
}

// ── Hover tooltip ─────────────────────────────────────────────────────────────
const htip=document.getElementById('htip');
function showTip(e,el){
  const p=PM[el.dataset.pid];
  const cov=parseFloat(el.dataset.cov);
  htip.innerHTML=`<div class="ht-id">${el.dataset.pid}</div>
    <div class="ht-lbl">${p.label}</div>
    <div class="ht-row"><span>${el.dataset.cl}</span><span class="ht-v">${el.dataset.val}</span></div>
    <div class="ht-row"><span>Coverage</span><span class="ht-v">${(cov*100).toFixed(0)}%</span></div>
    <div class="ht-row"><span>Group</span><span class="ht-v">${p.glabel}</span></div>`;
  htip.classList.add('vis');
  moveTip(e);
}
function hideTip(){htip.classList.remove('vis');}
function moveTip(e){
  htip.style.left=Math.min(e.clientX+14,window.innerWidth-230)+'px';
  htip.style.top=Math.max(0,e.clientY-10)+'px';
}
document.addEventListener('mousemove',e=>{if(htip.classList.contains('vis'))moveTip(e);});

// ── Shelf toggle ──────────────────────────────────────────────────────────────
function toggleShelf(){
  shelfOpen=!shelfOpen;
  document.getElementById('shelf').classList.toggle('hide',!shelfOpen);
  document.getElementById('shelfBtn').classList.toggle('on',shelfOpen);
}

// ── Directory navigator ───────────────────────────────────────────────────────
let dirDepth=0, dirPath=[];

function openDirAt(startDepth){
  dirDepth=startDepth;
  dirPath=tPos.slice(0,startDepth).map((pos,d)=>({depth:d,pos}));
  renderDir();
  document.getElementById('dirOverlay').classList.remove('off');
}
document.getElementById('dirBtn').onclick=()=>openDirAt(0);

function overlayClick(e){if(e.target.id==='dirOverlay')closeDir();}
function closeDir(){document.getElementById('dirOverlay').classList.add('off');}
function applyDir(){renderShelf();closeDir();}

function renderDir(){
  const lvl=LEVELS[dirDepth];
  const c=lvlColor(lvl);
  // Breadcrumb
  let bc=`<span class="bc-crumb" onclick="dirGo(0)">/</span>`;
  for(let i=0;i<dirPath.length;i++){
    const {depth,pos}=dirPath[i];
    bc+=`<span class="bc-sep">›</span><span class="bc-crumb${dirDepth===depth+1?' cur':''}" onclick="dirGo(${depth+1})">${posLabel(depth,pos)}</span>`;
  }
  document.getElementById('dirBC').innerHTML=bc;
  document.getElementById('dirBadge').innerHTML=
    `<span style="background:${c}28;color:${c};padding:2px 9px;border-radius:9px;font-size:9.5px;font-weight:700">${lvl.symbol} · ${lvl.name}</span>`;
  // Children
  let gh='';
  for(let i=0;i<lvl.fanout;i++){
    const isSel=tPos[dirDepth]===i;
    gh+=`<div class="d-child${isSel?' sel':''}" style="${isSel?'border-color:'+c+';color:'+c:''}"
      onclick="dirPick(${i})">${posLabel(dirDepth,i)}</div>`;
  }
  document.getElementById('dirGrid').innerHTML=gh;
  document.getElementById('dirInfo').textContent=`${lvl.fanout} items · depth ${dirDepth} of 14`;
}

function dirGo(depth){
  if(depth>dirDepth) return;
  dirDepth=depth;
  dirPath=dirPath.slice(0,depth);
  renderDir();
}

function dirPick(idx){
  tPos[dirDepth]=idx;
  if(dirDepth<14){
    dirPath.push({depth:dirDepth,pos:idx});
    dirDepth++;
    renderDir();
  } else {
    renderShelf();
    closeDir();
  }
}

// ── Resolution select ─────────────────────────────────────────────────────────
function onResChange(val){
  activeLvl=parseInt(val);
  renderShelf();
  updateInspLvl();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderTable();
renderShelf();
</script>
